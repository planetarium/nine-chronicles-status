status-website:
  baseUrl: /nine-chronicles-status
  name: Nine Chronicles Status
  introTitle: "**Nine Chronicles** Network Status"
  introMessage: >-
    Real-time availability monitoring for Nine Chronicles blockchain nodes.
    Deep block validation and alerting run separately via
    [node-uptime](https://github.com/planetarium/node-uptime).
  theme: dark
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

workflowSchedule:
  uptime: "*/5 * * * *"
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
